# 在项目根目录执行: docker compose up -d --build
# 需设置环境变量 DEEPSEEK_API_KEY，或在本目录创建 .env 文件
# 构建上下文为当前目录，以便把 index.html、app.js 等打入镜像

services:
  taoyaotodo:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      PORT: "3000"
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    restart: unless-stopped
